<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Income Report - Cafe Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem 1.5rem;
      color: white;
      text-align: center;
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .content {
      padding: 2rem 1.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn {
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #667eea;
      border: 2px solid #e0e0e0;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .btn.loading .spinner {
      display: block;
    }
    .btn.loading span {
      opacity: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 600;
      display: none;
      animation: slideIn 0.3s ease;
    }
    .message.show {
      display: block;
    }
    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }
    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    .message.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-section {
      display: block;
    }
    .report-section {
      display: none;
    }
    .report-section.show {
      display: block;
    }
    .summary-card {
      background: #f0f9ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .summary-card h3 {
      font-size: 1.1rem;
      color: #1e40af;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px dashed #dbeafe;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }
    .summary-row:last-child {
      border-bottom: none;
    }
    .summary-label {
      color: #333;
      font-weight: 600;
    }
    .summary-value {
      color: #1c4a78;
      font-weight: 700;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e0e0e0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-button {
      padding: 0.75rem 1rem;
      background: #f8f8f8;
      border: 2px solid #e0e0e0;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-weight: 600;
      color: #555;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .tab-button.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
      margin-bottom: -2px;
    }
    .tab-content {
      display: none;
      padding: 1.5rem 0;
    }
    .tab-content.show {
      display: block;
    }
    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 2rem;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .data-table th {
      background: #f2f2f2;
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      color: #333;
      border: 1px solid #ddd;
    }
    .data-table td {
      padding: 0.75rem;
      border: 1px solid #eee;
      text-align: right;
    }
    .data-table td:first-child {
      text-align: left;
    }
    .data-table tr:nth-child(even) {
      background: #f9f9f9;
    }
    .data-table tfoot td {
      font-weight: 700;
      background: #e0e7ff;
      border: 1px solid #ddd;
    }
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .hidden {
      display: none !important;
    }
    .date-filter {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: flex-end;
    }
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.5rem;
      }
      .date-filter {
        grid-template-columns: 1fr;
      }
      .button-row {
        grid-template-columns: 1fr;
      }
      .summary-row {
        flex-direction: column;
        gap: 0.5rem;
      }
      .form-group input,
      .form-group select {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <div id="loginSection" class="login-section">
      <div class="header">
        <h1>🔐 Admin Dashboard</h1>
        <p>Consolidated Income Report</p>
      </div>
      <div class="content">
        <form id="adminLoginForm">
          <div id="loginMessage" class="message"></div>

          <div class="form-group">
            <label for="adminUsername">Username</label>
            <input type="text" id="adminUsername" name="adminUsername" placeholder="Enter admin username" required>
          </div>

          <div class="form-group">
            <label for="adminPassword">Password</label>
            <input type="password" id="adminPassword" name="adminPassword" placeholder="Enter admin password" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">
            <span>Login</span>
            <div class="spinner"></div>
          </button>
        </form>
      </div>
    </div>

    <!-- Report Section -->
    <div id="reportSection" class="report-section">
      <div class="header">
        <h1>📊 Consolidated Income Report</h1>
        <p>All Locations Summary</p>
      </div>
      <div class="content">
        <div id="reportMessage" class="message"></div>

        <div class="date-filter">
          <div class="form-group">
            <label for="fromDate">From Date</label>
            <input type="date" id="fromDate" required>
          </div>
          <div class="form-group">
            <label for="toDate">To Date</label>
            <input type="date" id="toDate" required>
          </div>
          <button type="button" class="btn btn-primary" onclick="generateReport()">
            <span>Generate</span>
            <div class="spinner"></div>
          </button>
        </div>

        <div id="overallSummary" class="summary-card hidden">
          <h3>Overall Summary for Selected Period</h3>
          <div class="summary-row">
            <span class="summary-label">Total Collection Across All Locations:</span>
            <span class="summary-value" id="overallTotalCollection">₹0.00</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Total Online Collection:</span>
            <span class="summary-value" id="overallTotalOnlineCollection">₹0.00</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Total Cash Collection:</span>
            <span class="summary-value" id="overallTotalCashCollection">₹0.00</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">Total Remittance to Bank:</span>
            <span class="summary-value" id="overallTotalRemittanceToBank">₹0.00</span>
          </div>
        </div>

        <div class="button-row">
          <button type="button" class="btn btn-secondary hidden" id="downloadCsvBtn" onclick="downloadCsv()">
            <span>Download CSV</span>
            <div class="spinner"></div>
          </button>
          <button type="button" class="btn btn-secondary hidden" id="downloadPdfBtn" onclick="downloadPdf()">
            <span>Download PDF</span>
            <div class="spinner"></div>
          </button>
        </div>

        <div id="reportTabs" class="tabs"></div>
        <div id="tabContentContainer"></div>

        <button type="button" class="btn btn-secondary" style="width: 100%; margin-top: 2rem;" onclick="logoutAdmin()">
          Logout
        </button>
      </div>
    </div>
  </div>

  <script>
    // Configuration - Update this with your deployed Apps Script URL
    const APPS_SCRIPT_URL = 'YOUR_DEPLOYED_APPS_SCRIPT_URL';

    let currentReportData = null;

    // Set default dates
    function setDefaultDates() {
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById('fromDate').valueAsDate = firstDay;
      document.getElementById('toDate').valueAsDate = today;
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      setDefaultDates();
      document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
    });

    // Admin Login Handler
    async function handleAdminLogin(e) {
      e.preventDefault();
      const username = document.getElementById('adminUsername').value;
      const password = document.getElementById('adminPassword').value;
      const btn = e.target.querySelector('button[type="submit"]');
      
      showLoading(btn);
      showMessage('loginMessage', 'Authenticating...', 'info');

      try {
        const response = await google.script.run
          .withSuccessHandler((result) => {
            hideLoading(btn);
            if (result.success) {
              showSection('reportSection');
              showMessage('reportMessage', 'Login successful!', 'success');
              setDefaultDates();
            } else {
              showMessage('loginMessage', result.message, 'error');
            }
          })
          .withFailureHandler((error) => {
            hideLoading(btn);
            showMessage('loginMessage', 'Error: ' + (error.message || 'Login failed'), 'error');
          })
          .handleAdminLogin(username, password);
      } catch (error) {
        hideLoading(btn);
        showMessage('loginMessage', 'Error: ' + error.message, 'error');
      }
    }

    // Generate Report
    async function generateReport() {
      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;
      const btn = event.target.closest('.btn');

      if (!fromDate || !toDate) {
        showMessage('reportMessage', 'Please select both dates', 'error');
        return;
      }

      showLoading(btn);
      showMessage('reportMessage', 'Generating report...', 'info');

      try {
        const reportData = await google.script.run
          .withSuccessHandler((result) => {
            hideLoading(btn);
            if (result && result.length > 0) {
              currentReportData = result;
              displayReport(result);
              showMessage('reportMessage', 'Report generated successfully!', 'success');
              document.getElementById('downloadCsvBtn').classList.remove('hidden');
              document.getElementById('downloadPdfBtn').classList.remove('hidden');
            } else {
              showMessage('reportMessage', 'No data found for selected dates', 'error');
              clearReport();
            }
          })
          .withFailureHandler((error) => {
            hideLoading(btn);
            showMessage('reportMessage', 'Error: ' + (error.message || 'Report generation failed'), 'error');
            clearReport();
          })
          .getAggregatedReportData(fromDate, toDate);
      } catch (error) {
        hideLoading(btn);
        showMessage('reportMessage', 'Error: ' + error.message, 'error');
        clearReport();
      }
    }

    // Display Report
    function displayReport(reportData) {
      let totalCollection = 0;
      let totalOnlineCollection = 0;
      let totalCashCollection = 0;
      let totalRemittanceToBank = 0;

      reportData.forEach(location => {
        totalCollection += location.totalCollection;
        totalOnlineCollection += location.totalOnlineCollection;
        totalCashCollection += location.totalCashCollection;
        totalRemittanceToBank += location.totalRemittanceToBank;
      });

      document.getElementById('overallTotalCollection').textContent = formatCurrency(totalCollection);
      document.getElementById('overallTotalOnlineCollection').textContent = formatCurrency(totalOnlineCollection);
      document.getElementById('overallTotalCashCollection').textContent = formatCurrency(totalCashCollection);
      document.getElementById('overallTotalRemittanceToBank').textContent = formatCurrency(totalRemittanceToBank);
      document.getElementById('overallSummary').classList.remove('hidden');

      // Create tabs and content
      const tabsContainer = document.getElementById('reportTabs');
      const contentContainer = document.getElementById('tabContentContainer');
      tabsContainer.innerHTML = '';
      contentContainer.innerHTML = '';

      reportData.forEach((location, index) => {
        const tabId = 'tab-' + location.locationName.replace(/[^a-zA-Z0-9]/g, '-');
        
        const tabBtn = document.createElement('button');
        tabBtn.type = 'button';
        tabBtn.className = 'tab-button' + (index === 0 ? ' active' : '');
        tabBtn.textContent = location.locationName;
        tabBtn.onclick = () => switchTab(tabId);
        tabsContainer.appendChild(tabBtn);

        const content = document.createElement('div');
        content.id = tabId;
        content.className = 'tab-content' + (index === 0 ? ' show' : '');
        content.innerHTML = createLocationTable(location);
        contentContainer.appendChild(content);
      });
    }

    // Create Location Table
    function createLocationTable(location) {
      const tableHtml = `
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Metric</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Total Collection</td>
                <td>${formatCurrency(location.totalCollection)}</td>
              </tr>
              <tr>
                <td>Online Collection</td>
                <td>${formatCurrency(location.totalOnlineCollection)}</td>
              </tr>
              <tr>
                <td>Cash Collection</td>
                <td>${formatCurrency(location.totalCashCollection)}</td>
              </tr>
              <tr>
                <td>Remittance to Bank</td>
                <td>${formatCurrency(location.totalRemittanceToBank)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
      return tableHtml;
    }

    // Switch Tab
    function switchTab(tabId) {
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('show'));
      
      event.target.classList.add('active');
      document.getElementById(tabId).classList.add('show');
    }

    // Download CSV
    async function downloadCsv() {
      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;
      const btn = event.target.closest('.btn');
      
      showLoading(btn);

      try {
        const csv = await google.script.run
          .withSuccessHandler((result) => {
            hideLoading(btn);
            if (result) {
              downloadFile(result, `Income_Report_${fromDate}_to_${toDate}.csv`, 'text/csv');
              showMessage('reportMessage', 'CSV downloaded successfully!', 'success');
            }
          })
          .withFailureHandler((error) => {
            hideLoading(btn);
            showMessage('reportMessage', 'Error: ' + (error.message || 'CSV download failed'), 'error');
          })
          .getReportCsvData(fromDate, toDate);
      } catch (error) {
        hideLoading(btn);
        showMessage('reportMessage', 'Error: ' + error.message, 'error');
      }
    }

    // Download PDF
    async function downloadPdf() {
      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;
      const btn = event.target.closest('.btn');
      
      showLoading(btn);
      showMessage('reportMessage', 'Generating PDF...', 'info');

      try {
        const base64 = await google.script.run
          .withSuccessHandler((result) => {
            hideLoading(btn);
            if (result) {
              const byteCharacters = atob(result);
              const byteNumbers = new Array(byteCharacters.length);
              for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
              }
              const byteArray = new Uint8Array(byteNumbers);
              const blob = new Blob([byteArray], {type: 'application/pdf'});
              downloadFile(blob, `Income_Report_${fromDate}_to_${toDate}.pdf`);
              showMessage('reportMessage', 'PDF downloaded successfully!', 'success');
            }
          })
          .withFailureHandler((error) => {
            hideLoading(btn);
            showMessage('reportMessage', 'Error: ' + (error.message || 'PDF download failed'), 'error');
          })
          .generateAdminPdfReportBase64(fromDate, toDate);
      } catch (error) {
        hideLoading(btn);
        showMessage('reportMessage', 'Error: ' + error.message, 'error');
      }
    }

    // Download File Helper
    function downloadFile(content, filename, mimeType = 'application/octet-stream') {
      const url = typeof content === 'string' ? 
        URL.createObjectURL(new Blob([content], {type: mimeType})) :
        URL.createObjectURL(content);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // UI Helpers
    function showSection(sectionId) {
      document.querySelectorAll('[id$="Section"]').forEach(el => {
        el.classList.remove('show');
      });
      document.getElementById(sectionId).classList.add('show');
    }

    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'message show ' + type;
    }

    function showLoading(btn) {
      btn.classList.add('loading');
      btn.disabled = true;
    }

    function hideLoading(btn) {
      btn.classList.remove('loading');
      btn.disabled = false;
    }

    function clearReport() {
      document.getElementById('overallSummary').classList.add('hidden');
      document.getElementById('reportTabs').innerHTML = '';
      document.getElementById('tabContentContainer').innerHTML = '';
      document.getElementById('downloadCsvBtn').classList.add('hidden');
      document.getElementById('downloadPdfBtn').classList.add('hidden');
    }

    function logoutAdmin() {
      document.getElementById('adminLoginForm').reset();
      clearReport();
      showSection('loginSection');
      showMessage('loginMessage', 'Logged out successfully!', 'success');
    }

    function formatCurrency(value) {
      if (typeof value !== 'number' || isNaN(value)) return '₹0.00';
      return '₹' + value.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
  </script>
</body>
</html>
