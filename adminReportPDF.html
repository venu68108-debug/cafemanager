<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Income Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; }
    h1, h2, h3 { margin: 0.5em 0 0.2em 0;}
    table { border-collapse: collapse; width: 100%; margin-bottom: 1em;}
    th, td { border: 1px solid #999; padding: 4px 8px; text-align: right; }
    th { background: #ececec; }
    .section { margin-bottom: 1.5em; }
    .center { text-align: center; }
    .abstract-table th, .abstract-table td { text-align: right; }
    .footer { font-size: small; text-align: center; margin-top: 2em; color: #888; }
    .shop-header { background: #dbeafe; font-weight: bold; }
  </style>
</head>
<body>
<h1 class="center">CAFETERIA-ECOSHOP INCOME<br/><?= fromDate ?> to <?= toDate ?></h1>
<p class="center">Generated: <?= generatedOn ?></p>

  <div class="section">
    <h2>Abstract</h2>
    <table class="abstract-table">
      <tr><th>Shop</th><th>Total Collection</th><th>Online</th><th>Cash</th><th>Remittance</th></tr>
      <? for (var i=0; i<abstract.length; i++) { ?>
        <tr>
          <td style="text-align:left"><?= abstract[i].shop ?></td>
          <td><?= abstract[i].total.toFixed(2) ?></td>
          <td><?= abstract[i].online.toFixed(2) ?></td>
          <td><?= abstract[i].cash.toFixed(2) ?></td>
          <td><?= abstract[i].remit.toFixed(2) ?></td>
        </tr>
      <? } ?>
      <tr style="font-weight:bold; background: #f0f9ff"><td>Total</td>
        <td><?= total.total.toFixed(2) ?></td>
        <td><?= total.online.toFixed(2) ?></td>
        <td><?= total.cash.toFixed(2) ?></td>
        <td><?= total.remit.toFixed(2) ?></td>
      </tr>
    </table>
  </div>

  <div class="section">
    <h2>Day by Day Total (All Shops)</h2>
    <table>
      <tr><th>Date</th><th>Total Collection</th><th>Online</th><th>Cash</th><th>Remittance</th></tr>
      <? for (var i=0; i<totalByDate.length; i++) { ?>
        <tr>
          <td style="text-align:left"><?= totalByDate[i].date ?></td>
          <td><?= totalByDate[i].total.toFixed(2) ?></td>
          <td><?= totalByDate[i].online.toFixed(2) ?></td>
          <td><?= totalByDate[i].cash.toFixed(2) ?></td>
          <td><?= totalByDate[i].remit.toFixed(2) ?></td>
        </tr>
      <? } ?>
    </table>
  </div>

  <? for (var shop in shopDayMap) { ?>
    <div class="section">
      <h3 class="shop-header"><?= shop ?></h3>
      <table>
        <tr><th>Date</th><th>Total</th><th>Online</th><th>Cash</th><th>Remittance</th></tr>
        <? for (var i=0; i<shopDayMap[shop].length; i++) { ?>
          <tr>
            <td style="text-align:left"><?= shopDayMap[shop][i].date ?></td>
            <td><?= shopDayMap[shop][i].total.toFixed(2) ?></td>
            <td><?= shopDayMap[shop][i].online.toFixed(2) ?></td>
            <td><?= shopDayMap[shop][i].cash.toFixed(2) ?></td>
            <td><?= shopDayMap[shop][i].remit.toFixed(2) ?></td>
          </tr>
        <? } ?>
      </table>
    </div>
  <? } ?>

  <div class="footer">Generated by <?= generatedBy ?> on <?= generatedOn ?></div>
</body>
</html>
